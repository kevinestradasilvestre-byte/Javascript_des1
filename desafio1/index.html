<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Simuladores Interactivos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        
        <section class="card">
            <div class="card-header">
                <h2>Simulador de Transferencia de Calor</h2>
                <div class="formula-badge">
                    <code>T = Ts + (T0 - Ts) * e^(-k * t)</code>
                </div>
            </div>
            
            <form id="form-calor">
                <div class="form-group">
                    <label for="t0">Temperatura Inicial (T0) [°C]:</label>
                    <input type="number" id="t0" value="120" step="any" required>
                </div>
                
                <div class="form-group">
                    <label for="ts">Temperatura del Entorno (Ts) [°C]:</label>
                    <input type="number" id="ts" value="38" step="any" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="k">Constante (k):</label>
                        <input type="number" id="k" value="0.45" step="any" min="0" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="tiempo">Tiempo (horas):</label>
                        <input type="number" id="tiempo" value="3" step="any" min="0" required>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Calcular Simulación</button>
                </div>
            </form>

            <div id="resultado-calor" class="result-box hidden"></div>
        </section>

        <section class="card">
            <div class="card-header">
                <h2>Calculador de Combinaciones Complejas</h2>
                <div class="formula-badge">
                    <code>C(n, r) = n! / (r! * (n - r)!)</code>
                </div>
            </div>
            
            <form id="form-combinaciones">
                
                <div class="grupo-section">
                    <h3>Grupo 01</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="n1">Elementos (n1):</label>
                            <input type="number" id="n1" value="59" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="r1">Muestra (r1):</label>
                            <input type="number" id="r1" value="5" min="0" required>
                        </div>
                    </div>
                </div>

                <div class="grupo-section">
                    <h3>Grupo 02</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="n2">Elementos (n2):</label>
                            <input type="number" id="n2" value="35" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="r2">Muestra (r2):</label>
                            <input type="number" id="r2" value="1" min="0" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Calcular Combinaciones</button>
                </div>
            </form>

            <div id="resultado-combinaciones" class="result-box hidden"></div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
